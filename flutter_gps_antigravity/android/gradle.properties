org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# CAMBIO: Habilitamos el soporte para el nuevo DSL de Gradle
android.newDsl=false

# ADICIÓN: Forzamos la compatibilidad con Jetifier para el plugin 'location'
android.enableJetifier=true

# Mantén esto en false si el plugin 'location' aún no se migra a Built-in Kotlin por completo
android.builtInKotlin=false

# Agrega esto al final de android/gradle.properties si no existe
android.defaults.buildfeatures.buildconfig=true